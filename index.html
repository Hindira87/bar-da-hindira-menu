<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar da Hindira · Menu</title>
<meta name="description" content="Menu do Bar da Hindira, Maianga, Luanda. Comida e bebidas.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,600;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --fundo:#241209;
    --cartao:#331d10;
    --cartao-2:#3c2414;
    --dourado:#e8a23d;
    --dourado-claro:#f2c078;
    --marfim:#f5ede1;
    --marfim-suave:#cdbfae;
    --verde-wa:#25d366;
    --risco:#5a3a20;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){html{scroll-behavior:auto;}}
  body{
    background:var(--fundo);
    color:var(--marfim);
    font-family:'Inter',system-ui,sans-serif;
    font-size:16px;
    line-height:1.5;
    padding-bottom:96px;
  }
  header{
    text-align:center;
    padding:40px 20px 20px;
    background:
      radial-gradient(ellipse 90% 70% at 50% -20%, #4a2b14 0%, transparent 70%),
      var(--fundo);
  }
  header .marca{
    font-family:'Fraunces',serif;
    font-style:italic;
    font-weight:600;
    color:var(--dourado);
    font-size:1.35rem;
    letter-spacing:.02em;
  }
  header h1{
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:2rem;
    letter-spacing:.14em;
    margin-top:2px;
  }
  header .local{
    color:var(--marfim-suave);
    font-size:.82rem;
    margin-top:8px;
    letter-spacing:.04em;
  }
  /* Comida / Bebidas */
  .abas{
    display:flex;
    justify-content:center;
    gap:8px;
    padding:18px 20px 0;
  }
  .aba{
    font:600 .95rem 'Inter',sans-serif;
    letter-spacing:.08em;
    color:var(--marfim-suave);
    background:transparent;
    border:1px solid var(--risco);
    border-radius:999px;
    padding:10px 26px;
    cursor:pointer;
  }
  .aba[aria-selected="true"]{
    background:var(--dourado);
    border-color:var(--dourado);
    color:#241209;
  }
  .aba:focus-visible{outline:2px solid var(--dourado-claro);outline-offset:2px;}
  /* navegação de secções */
  nav.chips{
    position:sticky;
    top:0;
    z-index:10;
    background:rgba(36,18,9,.96);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--risco);
    overflow-x:auto;
    white-space:nowrap;
    padding:12px 16px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  nav.chips::-webkit-scrollbar{display:none;}
  nav.chips a{
    display:inline-block;
    color:var(--dourado-claro);
    text-decoration:none;
    font-size:.82rem;
    font-weight:600;
    letter-spacing:.05em;
    padding:7px 14px;
    border:1px solid var(--risco);
    border-radius:999px;
    margin-right:8px;
  }
  nav.chips a:focus-visible{outline:2px solid var(--dourado-claro);outline-offset:2px;}
  main{max-width:640px;margin:0 auto;padding:8px 20px 40px;}
  section{padding-top:28px;}
  section h2{
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:.95rem;
    letter-spacing:.14em;
    color:var(--dourado);
    text-transform:uppercase;
    padding-bottom:8px;
    border-bottom:2px solid var(--dourado);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  section h2 small{
    font-weight:500;
    font-size:.72rem;
    letter-spacing:.04em;
    color:var(--marfim-suave);
    text-transform:none;
  }
  ul.itens{list-style:none;margin-top:6px;}
  ul.itens li{
    display:flex;
    align-items:baseline;
    gap:8px;
    padding:12px 0;
    border-bottom:1px dotted var(--risco);
  }
  ul.itens li:last-child{border-bottom:none;}
  .nome{flex-shrink:1;}
  .fio{
    flex:1;
    border-bottom:1px dotted var(--risco);
    transform:translateY(-4px);
    min-width:16px;
  }
  .preco{
    font-weight:700;
    font-variant-numeric:tabular-nums;
    color:var(--dourado-claro);
    white-space:nowrap;
    font-size:.95rem;
  }
  .painel[hidden]{display:none;}
  footer{
    text-align:center;
    color:var(--marfim-suave);
    font-size:.78rem;
    padding:24px 20px 8px;
  }

  /* galeria de fotos */
  .galeria{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    grid-template-rows:repeat(2, clamp(84px, 20vw, 150px));
    gap:8px;
    padding:16px 20px 4px;
    max-width:640px;
    margin:0 auto;
  }
  .galeria .foto{
    position:relative;
    margin:0;
    overflow:hidden;
    border-radius:10px;
    border:1px solid var(--risco);
    background:var(--cartao);
  }
  .galeria .foto img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .galeria .destaque{
    grid-column:1 / 3;
    grid-row:1 / 3;
  }
  .galeria figcaption{
    position:absolute;
    left:0; right:0; bottom:0;
    padding:22px 12px 10px;
    background:linear-gradient(to top, rgba(20,10,5,.85), transparent);
    font-family:'Fraunces',serif;
    font-style:italic;
    font-weight:600;
    color:var(--dourado-claro);
    font-size:.85rem;
    letter-spacing:.02em;
  }

  a.wa{
    position:fixed;
    right:16px;
    bottom:16px;
    z-index:20;
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--verde-wa);
    color:#08300f;
    font-weight:700;
    font-size:.9rem;
    text-decoration:none;
    padding:13px 18px;
    border-radius:999px;
    box-shadow:0 6px 18px rgba(0,0,0,.45);
  }
  a.wa svg{flex-shrink:0;}
  a.wa:focus-visible{outline:3px solid #fff;outline-offset:2px;}
</style>
</head>

      ["Shot", 1000]
    ]],
    ["Água", null, [
      ["Água pequena", 200],
      ["Água grande", 500]
    ]]
  ]
};
/* ===================== FIM DO BLOCO EDITÁVEL ===================== */

const fmt = n => n.toLocaleString("pt-PT") + " kzs";
const slug = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/gi,"-").toLowerCase();

function render(tab){
  const secs = MENU[tab];
  const painel = document.getElementById("painel-" + tab);
  if (!painel.dataset.feito){
    painel.innerHTML = secs.map(([titulo, nota, itens]) => `
      <section id="${tab}-${slug(titulo)}">
        <h2>${titulo}${nota ? `<small>${nota}</small>` : ""}</h2>
        <ul class="itens">
          ${itens.map(([nome, preco]) => `
            <li><span class="nome">${nome}</span><span class="fio" aria-hidden="true"></span><span class="preco">${fmt(preco)}</span></li>
          `).join("")}
        </ul>
      </section>`).join("");
    painel.dataset.feito = "1";
  }
  document.getElementById("chips").innerHTML =
    secs.map(([titulo]) => `<a href="#${tab}-${slug(titulo)}">${titulo.split(" / ")[0]}</a>`).join("");
  document.getElementById("painel-comida").hidden = tab !== "comida";
  document.getElementById("painel-bebidas").hidden = tab !== "bebidas";
  document.getElementById("aba-comida").setAttribute("aria-selected", tab === "comida");
  document.getElementById("aba-bebidas").setAttribute("aria-selected", tab === "bebidas");
}

document.getElementById("aba-comida").addEventListener("click", () => render("comida"));
document.getElementById("aba-bebidas").addEventListener("click", () => render("bebidas"));
render("comida");
</script>
</body>
</html>
